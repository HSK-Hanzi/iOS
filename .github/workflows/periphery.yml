name: Periphery

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  periphery:
    name: Run Periphery
    runs-on: macos-26
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      # setup-swift xcode-selects the Xcode that can open the project's file
      # format; keep it pinned to the same toolchain the other workflows use.
      - uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3"
      - name: Ensure iOS simulator runtime
        run: |
          VERSION=$(xcrun --sdk iphonesimulator --show-sdk-version)
          if xcrun simctl list runtimes | grep -q "iOS ${VERSION}"; then
            echo "iOS ${VERSION} runtime already installed"
          else
            echo "iOS ${VERSION} runtime not found, downloading..."
            xcodebuild -downloadPlatform iOS
          fi
      - name: Create simulator
        id: sim
        run: |
          while xcrun simctl delete "periphery-sim" 2>/dev/null; do :; done
          UDID=$(xcrun simctl create "periphery-sim" com.apple.CoreSimulator.SimDeviceType.iPhone-17-Pro)
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: false

      # Periphery builds the app, and the build needs the open-licensed data. Data/Open is public, so
      # rewrite its SSH submodule URL to anonymous HTTPS and init just that submodule (pulling its Git
      # LFS plists). Data/Proprietary stays absent — the build falls back to open-only data.
      - name: Check out the open data submodule
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init Data/Open
          git -C Data/Open lfs pull

      - name: Enable macros
        run: defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES
      - name: Install Periphery
        run: brew install periphery
      # Zili builds for both iOS and macOS, and a symbol used only under `#if os(...)` on one platform
      # looks unused to a single-platform scan, so the index must cover both. Xcode 26's build service
      # traps (SIGTRAP, surfacing as "exit status 5") when one `build-for-testing` invocation targets an
      # iOS-Simulator and a macOS destination together, so build each platform in its own invocation
      # into a shared derived-data dir — matching the flags Periphery would pass itself — then let
      # Periphery analyze the merged index store with --skip-build. The runner has no signing cert, so
      # ad-hoc sign and drop the entitlements — these analysis builds never ship.
      - name: Build both platforms for indexing
        env:
          SIM_UDID: ${{ steps.sim.outputs.udid }}
        run: |
          build() {
            xcodebuild \
              -project Zili.xcodeproj \
              -scheme Zili \
              -parallelizeTargets \
              -derivedDataPath "$RUNNER_TEMP/peri-dd" \
              build-for-testing \
              CODE_SIGNING_ALLOWED=NO \
              ENABLE_BITCODE=NO \
              DEBUG_INFORMATION_FORMAT=dwarf \
              COMPILER_INDEX_STORE_ENABLE=YES \
              INDEX_ENABLE_DATA_STORE=YES \
              -destination-timeout 300 \
              CODE_SIGN_IDENTITY=- \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=YES \
              CODE_SIGN_STYLE=Manual \
              DEVELOPMENT_TEAM= \
              PROVISIONING_PROFILE_SPECIFIER= \
              CODE_SIGN_ENTITLEMENTS= \
              "$@"
          }
          build -destination "platform=macOS,arch=arm64"
          build -destination "platform=iOS Simulator,id=${SIM_UDID}"
      - name: Run Periphery
        run: |
          periphery scan --strict --skip-build \
            --index-store-path "$RUNNER_TEMP/peri-dd/Index.noindex/DataStore"
