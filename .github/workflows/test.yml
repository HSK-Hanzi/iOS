name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test on ${{ matrix.name }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: iPhone
            destination: platform=iOS Simulator,name=iPhone 17 Pro
            simulator: iPhone 17 Pro
          - name: iPad
            destination: platform=iOS Simulator,name=iPad Pro 13-inch (M5)
            simulator: iPad Pro 13-inch (M5)
          - name: macOS
            destination: platform=macOS
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: false

      # Only the open-licensed data is needed to build and test. Data/Open is public, so rewrite its
      # SSH submodule URL to anonymous HTTPS and init just that submodule (pulling its Git LFS
      # plists). Data/Proprietary stays absent — the build falls back to open-only data — so CI never
      # needs a key and outside pull requests, which can't see secrets, still run.
      - name: Check out the open data submodule
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init Data/Open
          git -C Data/Open lfs pull

      - name: Select the newest installed Xcode
        run: |
          xcode_app="$(find /Applications -maxdepth 1 -name 'Xcode*.app' | sort -V | tail -1)"
          sudo xcode-select -s "$xcode_app/Contents/Developer"
          xcodebuild -version

      - name: Boot the simulator
        if: matrix.simulator
        run: xcrun simctl boot "${{ matrix.simulator }}" || true

      # XCUITEST_TIMEOUT_MULTIPLIER stretches XCUITestKit's waits so the slower CI hardware doesn't
      # trip element lookups that pass locally. The Test action runs the Debug configuration; with
      # only the open data present the licensed dictionaries are skipped and the suite runs open-only.
      - name: Run tests
        env:
          XCUITEST_TIMEOUT_MULTIPLIER: "3"
        run: |
          set -o pipefail
          xcodebuild test \
            -project Zili.xcodeproj \
            -scheme Zili \
            -testPlan Zili \
            -destination "${{ matrix.destination }}" \
            -resultBundlePath "TestResults-${{ matrix.name }}.xcresult"

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.name }}
          path: TestResults-${{ matrix.name }}.xcresult
          if-no-files-found: ignore
