/* Begin PBXShellScriptBuildPhase section */
		4077CCF52F6490507C3BCBAF /* Copy Data Resources */ = {
			isa = PBXShellScriptBuildPhase;
			alwaysOutOfDate = 1;
			buildActionMask = 2147483647;
			files = (
			);
			inputFileListPaths = (
			);
			inputPaths = (
			);
			name = "Copy Data Resources";
			outputFileListPaths = (
			);
			outputPaths = (
			);
			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "set -eu\n# Bundles the app's data from the non-synchronized Data/ tree. Word dictionaries, word frequency,\n# stroke order, and character data are converted to prebuilt SQLite databases (generated once,\n# cached by timestamp) so the app queries them on disk; the HSK syllabus stays a plist. Open data\n# is always included; licensed dictionaries only when INCLUDE_LICENSED_DICTIONARIES is set (Debug).\nDEST=\"${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}\"\nGEN=\"${SRCROOT}/Tools/generate_db.py\"\nOPEN=\"${SRCROOT}/Data/Open\"\nLICENSED=\"${SRCROOT}/Data/Proprietary\"\nFREQUENCY_PLIST=\"${OPEN}/SUBTLEX-CH-Words.plist\"\nREADINGS_PLIST=\"${OPEN}/CharacterReadings.plist\"\nmkdir -p \"${DEST}\"\n\n# outdated <dest> <src...> — true when dest is missing or older than the generator or any source.\noutdated() {\n  dest=\"$1\"\n  shift\n  [ -e \"${dest}\" ] || return 0\n  [ \"${GEN}\" -nt \"${dest}\" ] && return 0\n  for src in \"$@\"; do\n    [ \"${src}\" -nt \"${dest}\" ] && return 0\n  done\n  return 1\n}\n\n# copy_plist <src> — bundles a plist as-is (like the HSK syllabus and the sentence corpora),\n# refreshing the copy only when the source is newer. A missing source is skipped, not an error.\ncopy_plist() {\n  src=\"$1\"\n  name=\"$(basename \"${src}\")\"\n  [ -e \"${src}\" ] || return 0\n  if [ ! -e \"${DEST}/${name}\" ] || [ \"${src}\" -nt \"${DEST}/${name}\" ]; then\n    cp -f \"${src}\" \"${DEST}/${name}\"\n    echo \"note: bundled data ${name}\"\n  fi\n}\n\n# Word frequency ranks are folded into every dictionary, so dictionaries depend on the frequency\n# plist as well as their own source.\ngen_dictionary() {\n  base=\"$(basename \"$1\" .plist)\"\n  out=\"${DEST}/${base}.sqlite\"\n  if outdated \"${out}\" \"$1\" \"${FREQUENCY_PLIST}\" \"${READINGS_PLIST}\"; then\n    /usr/bin/env python3 \"${GEN}\" dictionary \"$1\" \"${out}\" --frequency \"${FREQUENCY_PLIST}\" --readings \"${READINGS_PLIST}\"\n    rm -f \"${DEST}/${base}.plist\"\n    echo \"note: generated ${base}.sqlite\"\n  fi\n}\n\ngen_dictionary \"${OPEN}/CEDICT.plist\"\n\nout=\"${DEST}/SUBTLEX-CH-Words.sqlite\"\nif outdated \"${out}\" \"${FREQUENCY_PLIST}\"; then\n  /usr/bin/env python3 \"${GEN}\" frequency \"${FREQUENCY_PLIST}\" \"${out}\"\n  rm -f \"${DEST}/SUBTLEX-CH-Words.plist\"\n  echo \"note: generated SUBTLEX-CH-Words.sqlite\"\nfi\n\nout=\"${DEST}/HanziStrokeOrder.sqlite\"\nif outdated \"${out}\" \"${OPEN}/HanziStrokeOrder.plist\"; then\n  /usr/bin/env python3 \"${GEN}\" strokes \"${OPEN}/HanziStrokeOrder.plist\" \"${out}\"\n  rm -f \"${DEST}/HanziStrokeOrder.plist\"\n  echo \"note: generated HanziStrokeOrder.sqlite\"\nfi\n\nout=\"${DEST}/Characters.sqlite\"\nif outdated \"${out}\" \"${OPEN}/CharacterReadings.plist\" \"${OPEN}/CharacterEtymology.plist\" \"${OPEN}/CharacterFrequency.plist\"; then\n  /usr/bin/env python3 \"${GEN}\" characters \\\n    \"${OPEN}/CharacterReadings.plist\" \"${OPEN}/CharacterEtymology.plist\" \\\n    \"${OPEN}/CharacterFrequency.plist\" \"${out}\"\n  rm -f \"${DEST}/CharacterReadings.plist\" \"${DEST}/CharacterEtymology.plist\" \\\n    \"${DEST}/CharacterFrequency.plist\"\n  echo \"note: generated Characters.sqlite\"\nfi\n\ncopy_plist \"${OPEN}/HSKVocabulary.plist\"\ncopy_plist \"${OPEN}/PracticeSentences.plist\"\n\ncase \" ${SWIFT_ACTIVE_COMPILATION_CONDITIONS:-} \" in\n  *\" INCLUDE_LICENSED_DICTIONARIES \"*)\n    if [ -e \"${LICENSED}/HSKSentences.plist\" ]; then\n      copy_plist \"${LICENSED}/HSKSentences.plist\"\n      for f in \"${LICENSED}\"/*.plist; do\n        [ -e \"${f}\" ] || continue\n        [ \"$(basename \"${f}\")\" = \"HSKSentences.plist\" ] && continue\n        gen_dictionary \"${f}\"\n      done\n    else\n      echo \"note: proprietary data absent (Data/Proprietary not checked out); building open-only\"\n    fi\n    ;;\nesac\n";
		};
/* End PBXShellScriptBuildPhase section */

